[project]
name = "siebert-pipeline"
version = "0.5.0"
description = "Streamlit app for classifying text sentiment using SiEBERT"
requires-python = ">=3.12"
dependencies = [
    "mlx",
    "mlx-transformers",
    "python-dotenv",
    "pandas",
    "streamlit",
    "transformers",
]

[dependency-groups]
dev = ["pytest", "ruff", "ty"]
convert = ["safetensors", "torch"]

[tool.uv]
override-dependencies = ["streamlit>=1.34.0,<2.0"]

[tool.pytest.ini_options]
pythonpath = ["."]
