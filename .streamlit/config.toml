# shadcn/ui-inspired Streamlit theme — light + dark modes.
# Shared typography, shape, and semantic palette live in [theme];
# per-mode surface colors live in [theme.light] / [theme.dark]. Because both
# modes are defined, the app keeps the light/dark toggle in the settings menu
# (a single [theme] block would lock the app to one mode).

[theme]
# Typography (Google Fonts; shared across modes)
font = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
codeFontSize = "0.875rem"
baseFontSize = 14
baseFontWeight = 400
headingFontSizes = ["36px", "30px", "24px", "20px", "16px", "14px"]
headingFontWeights = [600, 600, 600, 600, 600, 600]
linkUnderline = true

# Shape (shared)
baseRadius = "6px"
buttonRadius = "6px"
showWidgetBorder = true
showSidebarBorder = true

# Semantic palette — chosen to read on both light and dark backgrounds
grayColor = "#71717A"
blueColor = "#3B82F6"
greenColor = "#22C55E"
redColor = "#EF4444"
yellowColor = "#EAB308"
orangeColor = "#F97316"
violetColor = "#8B5CF6"
chartCategoricalColors = ["#18181B", "#71717A", "#A1A1AA", "#D4D4D8", "#3B82F6", "#EF4444", "#22C55E"]

# ---- Light mode (shadcn zinc on white; unchanged from the approved theme) ----
[theme.light]
primaryColor = "#18181B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#FAFAFA"
codeBackgroundColor = "#F4F4F5"
codeTextColor = "#18181B"
textColor = "#09090B"
linkColor = "#18181B"
borderColor = "#E4E4E7"
dataframeBorderColor = "#E4E4E7"
dataframeHeaderBackgroundColor = "#FAFAFA"

[theme.light.sidebar]
backgroundColor = "#FAFAFA"
secondaryBackgroundColor = "#F4F4F5"
codeBackgroundColor = "#E4E4E7"
textColor = "#09090B"
borderColor = "#E4E4E7"
primaryColor = "#18181B"
dataframeHeaderBackgroundColor = "#F4F4F5"
dataframeBorderColor = "#E4E4E7"

# ---- Dark mode (shadcn zinc on near-black; blue primary so white button
#      text stays readable and the accent pops against the dark surface) ----
[theme.dark]
primaryColor = "#3B82F6"
backgroundColor = "#09090B"
secondaryBackgroundColor = "#18181B"
codeBackgroundColor = "#27272A"
codeTextColor = "#FAFAFA"
textColor = "#FAFAFA"
linkColor = "#60A5FA"
borderColor = "#27272A"
dataframeBorderColor = "#27272A"
dataframeHeaderBackgroundColor = "#18181B"

[theme.dark.sidebar]
backgroundColor = "#18181B"
secondaryBackgroundColor = "#27272A"
codeBackgroundColor = "#27272A"
textColor = "#FAFAFA"
borderColor = "#27272A"
primaryColor = "#3B82F6"
dataframeHeaderBackgroundColor = "#27272A"
dataframeBorderColor = "#27272A"
